apiVersion: apps/v1
kind: Deployment
metadata:
  name: despacho               # ← K8S_DEPLOYMENT_NAME en GitHub Secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: despacho
  template:
    metadata:
      labels:
        app: despacho
    spec:
      containers:
        - name: despacho-app    # ← K8S_CONTAINER_NAME en GitHub Secrets
          image: nginx:alpine   # placeholder, el workflow lo reemplaza con kubectl set image
          ports:
            - containerPort: 8081
          env:
            - name: DB_ENDPOINT
              value: despacho-mysql-service   # nombre del Service de MySQL (abajo)
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: despacho-db-secret
                  key: MYSQL_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: despacho-db-secret
                  key: MYSQL_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: despacho-db-secret
                  key: MYSQL_PASSWORD